name: Windows x86

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CC: gcc
  
defaults:
    run:
      shell: msys2 {0}

jobs:
   build:
    runs-on: windows-latest
    steps: 
     - uses: actions/checkout@v4  
     - name: Setup Environment
       uses: msys2/setup-msys2@v2
       with: 
        msystem: MINGW32
        install: >- 
         git 
         make
         mingw-w64-i686-gcc
         mingw-w64-i686-zlib
         mingw-w64-i686-libpng
         mingw-w64-i686-SDL2
         mingw-w64-i686-SDL2_mixer
         nasm

     
     - name: Build SRB2 Retro
       run: |
        touch src/comptime.h
        make -C src/ --keep-going MINGW=1 SDL=1 -j

     - name: Upload Artifacts
       uses: actions/upload-artifact@v4.3.4
       with:
        name: srb2retro-WIN32
        path: |
          bin/
          src/comptime.h 

     - name: Download Artifacts
       uses: actions/download-artifact@v4.1.8
       with:
        name: srb2retro-WIN32
       continue-on-error: true